name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Backend — Maven build + test ────────────────────────────────────────────
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       stocksense_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/stocksense_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_DATA_REDIS_HOST:     localhost
          SPRING_DATA_REDIS_PORT:     6379
          JWT_SECRET:                 test-secret-key-that-is-at-least-32-characters-long
          ALPHAVANTAGE_API_KEY:       demo
          STRIPE_SECRET_KEY:          sk_test_placeholder
          RAZORPAY_KEY_ID:            rzp_test_placeholder
          RAZORPAY_KEY_SECRET:        placeholder
        run: mvn clean verify -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # ── Frontend — Next.js build ─────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 / Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true   # don't fail CI on type errors yet

      - name: Build
        env:
          NEXT_PUBLIC_API_URL:              http://localhost:8081
          NEXT_PUBLIC_ML_URL:               http://localhost:8082
          NEXT_PUBLIC_GOOGLE_CLIENT_ID:     ""
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_RAZORPAY_KEY_ID:      rzp_test_placeholder
        run: npm run build

  # ── Docker build check ────────────────────────────────────────────────────────
  docker:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Build all images
        run: docker compose build --parallel
        env:
          POSTGRES_PASSWORD:          password
          JWT_SECRET:                 test-secret-key-that-is-at-least-32-characters-long
          ALPHAVANTAGE_API_KEY:       demo
          STRIPE_SECRET_KEY:          sk_test_placeholder
          STRIPE_PUBLISHABLE_KEY:     pk_test_placeholder
          STRIPE_WEBHOOK_SECRET:      whsec_placeholder
          RAZORPAY_KEY_ID:            rzp_test_placeholder
          RAZORPAY_KEY_SECRET:        placeholder
          GOOGLE_CLIENT_ID:           ""