spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/stocksense}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:onealpha457@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:jpoxrbibcbkcxtyn}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 1000ms

server:
  port: ${PORT:8081}

alphavantage:
  api:
    key: ${ALPHAVANTAGE_API_KEY:demo}

ml:
  service:
    url: ${ML_SERVICE_URL:http://ml-service:8082}

sentry:
  dsn: ${SENTRY_DSN:}
  traces-sample-rate: 0.1
  environment: ${SENTRY_ENVIRONMENT:development}
  enable-tracing: true
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

stripe:
  secret:
    key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  publishable:
    key: ${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
    secret: ${RAZORPAY_KEY_SECRET:placeholder}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-here-change-in-production-min-32-chars}
  expiration: ${JWT_EXPIRATION:900000}

google:
  client-id: ${GOOGLE_CLIENT_ID:724652717839-u1lacrp7rmj5rp2117vhnpoj26t5vgm5.apps.googleusercontent.com}

logging:
  level:
    com.stocksense: INFO
    com.stocksense.service.StockService: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never